name: nextjs-build-and-push-template

# Next.js アプリの Docker イメージを ECR に push するテンプレート
on:
  # dev ブランチへの push で実行
  push:
    branches: [dev]
  # dev 向け PR が close されたときに実行（merge 判定は job 側）
  pull_request:
    branches: [dev]
    types: [closed]
  # 手動実行
  workflow_dispatch:

env:
  # サンプル値。利用時は必要に応じて変更
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: sample-nextjs-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # push 時、または PR が merge されて close された時のみ実行
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    # OIDC 連携に必要な最小権限
    permissions:
      id-token: write
      contents: read

    steps:
      # ソース取得
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC で AWS 一時クレデンシャルを取得
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsECRPush
          aws-region: ${{ env.AWS_REGION }}

      # ECR ログイン
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # SHA タグと latest タグでイメージを push
      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
