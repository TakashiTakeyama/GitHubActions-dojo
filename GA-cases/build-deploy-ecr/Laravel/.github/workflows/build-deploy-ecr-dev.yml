name: Build & Deploy Laravel to ECR

# Laravel 用 ECR push テンプレート（最小構成）
on:
  # 開発ブランチ更新時に実行
  push:
    branches: [dev]
  # 手動実行
  workflow_dispatch:

env:
  # サンプル値。利用時は環境に合わせて変更
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: sample-laravel-app

jobs:
  build-and-push:
    # Ubuntu ランナーで実行
    runs-on: ubuntu-latest

    # OIDC + リポジトリ読み取りの最小権限
    permissions:
      id-token: write
      contents: read

    steps:
      # ソースコード取得
      - name: Checkout code
        uses: actions/checkout@v4

      # AWS へ OIDC 認証
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsECRPush
          aws-region: ${{ env.AWS_REGION }}

      # ECR ログイン
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Docker build -> ECR push（sha / latest）
      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
