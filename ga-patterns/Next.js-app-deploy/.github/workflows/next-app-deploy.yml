name: nextjs-build-and-push-template

# Next.js アプリの Docker イメージを ECR に push するテンプレート
on:
  # dev ブランチへの push で実行
  push:
    branches: [dev]
  # dev 向け PR が close されたときに実行（merge 判定は job 側）
  pull_request:
    branches: [dev]
    types: [closed]
  # 手動実行
  workflow_dispatch:

env:
  # 利用時は必要に応じて変更
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: sample-nextjs-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # push 時、または PR が merge されて close された時のみ実行
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    # OIDC 連携に必要な最小権限
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ECR 向け共通処理は composite action に集約する
      - name: Build and push image to ECR
        uses: ./.github/actions/ecr-build-push
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsECRPush
          ecr-repository: ${{ env.ECR_REPOSITORY }}
          image-tags: |
            ${{ github.sha }}
            latest
